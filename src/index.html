<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net;">
  <title>AlexIDE</title>
  <link rel="icon" href="" id="favicon" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css">
</head>
<body>
  <div class="ide">
    <div class="workbench">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-tabs">
            <button type="button" class="sidebar-tab open" id="sidebar-tab-explorer" aria-pressed="true">Folder</button>
            <button type="button" class="sidebar-tab" id="sidebar-tab-git" aria-pressed="false">Git</button>
          </div>
        </div>
        <div class="sidebar-content">
          <div id="explorer-context-menu" class="context-menu" role="menu" aria-hidden="true"></div>
          <div id="sidebar-panel-explorer" class="sidebar-panel">
            <div id="folder-placeholder" class="placeholder">
              <p>No folder opened</p>
              <button type="button" class="open-folder-btn" id="open-folder-sidebar">Open Folder</button>
            </div>
            <div id="file-tree" class="file-tree" style="display: none;"></div>
          </div>
          <div id="sidebar-panel-git" class="sidebar-panel" style="display: none;">
            <div id="git-changes-placeholder" class="placeholder">
              <p>Open a folder to use Git.</p>
            </div>
            <div id="git-panel-content" class="git-panel-content" style="display: none;">
              <textarea id="git-commit-message" class="git-message-input" placeholder="Commit message" rows="2"></textarea>
              <div class="git-actions">
                <button type="button" id="git-commit-btn" class="git-btn git-btn-commit">Commit</button>
                <button type="button" id="git-push-btn" class="git-btn git-btn-push">Push</button>
              </div>
              <div class="git-section">
                <div class="git-section-header-row">
                  <button type="button" class="git-section-header" id="git-staged-header" aria-expanded="true">
                    <span class="git-section-chevron">▼</span>
                    <span class="git-section-title">Staged changes</span>
                    <span class="git-section-count" id="git-staged-count">0</span>
                  </button>
                  <button type="button" class="git-toolbar-btn git-btn-icon" id="git-unstage-all-btn" style="display: none;" title="Unstage all" aria-label="Unstage all"><span class="git-icon" aria-hidden="true"><svg width="12" height="12" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M25 38c-5.1 0-9.7-3-11.8-7.6l1.8-.8c1.8 3.9 5.7 6.4 10 6.4 6.1 0 11-4.9 11-11s-4.9-11-11-11c-4.6 0-8.5 2.8-10.1 7.3l-1.9-.7c1.9-5.2 6.6-8.6 12-8.6 7.2 0 13 5.8 13 13s-5.8 13-13 13z"/><path d="M20 22h-8v-8h2v6h6z"/></svg></span></button>
                </div>
                <div class="git-section-body" id="git-staged-list"></div>
              </div>
              <div class="git-section">
                <div class="git-section-header-row">
                  <button type="button" class="git-section-header" id="git-pending-header" aria-expanded="true">
                    <span class="git-section-chevron">▼</span>
                    <span class="git-section-title">Changes</span>
                    <span class="git-section-count" id="git-pending-count">0</span>
                  </button>
                  <button type="button" class="git-toolbar-btn git-btn-icon" id="git-stage-all-btn" style="display: none;" title="Stage all" aria-label="Stage all"><span class="git-icon" aria-hidden="true"><svg width="12" height="12" viewBox="0 0 12 12"><path fill="currentColor" d="M6 2v3h3v2H6v3H4V7H1V5h3V2z"/></svg></span></button>
                  <button type="button" class="git-toolbar-btn git-btn-icon" id="git-undo-all-btn" style="display: none;" title="Undo all" aria-label="Undo all"><span class="git-icon" aria-hidden="true"><svg width="12" height="12" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M25 38c-5.1 0-9.7-3-11.8-7.6l1.8-.8c1.8 3.9 5.7 6.4 10 6.4 6.1 0 11-4.9 11-11s-4.9-11-11-11c-4.6 0-8.5 2.8-10.1 7.3l-1.9-.7c1.9-5.2 6.6-8.6 12-8.6 7.2 0 13 5.8 13 13s-5.8 13-13 13z"/><path d="M20 22h-8v-8h2v6h6z"/></svg></span></button>
                </div>
                <div class="git-section-body" id="git-pending-list"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>
      <div class="sidebar-resizer" id="sidebar-resizer" title="Drag to resize"></div>
      <main class="editor-area">
        <div class="tabs" id="tabs"></div>
        <div class="editor-container" id="editor-container">
          <div id="monaco-root"></div>
          <div id="monaco-diff-root" class="monaco-diff-container" aria-hidden="true">
            <div id="diff-view-content" class="diff-view-content"></div>
          </div>
        </div>
      </main>
    </div>

    <div class="panel-resizer" id="panel-resizer" title="Drag to resize"></div>
    <section class="panel" id="terminal-panel" aria-label="Terminal">
      <div class="panel-header">
        <span class="panel-title">Terminal</span>
        <button type="button" class="panel-add-terminal" id="panel-add-terminal" aria-label="New terminal" title="New terminal">+</button>
        <button type="button" class="panel-toggle" id="panel-toggle" aria-label="Minimize terminal panel">−</button>
      </div>
      <div class="panel-content">
        <div class="terminal-view" id="terminal-view"></div>
        <div class="terminal-tabs" id="terminal-tabs" aria-label="Terminal instances"></div>
      </div>
    </section>

    <footer class="status-bar">
      <div class="status-left">
        <div class="branch-switcher" id="branch-switcher">
          <button type="button" class="branch-switcher-trigger" id="branch-switcher-trigger" aria-haspopup="listbox" aria-expanded="false">No branch</button>
          <div class="branch-switcher-dropdown" id="branch-switcher-dropdown" role="listbox" aria-hidden="true"></div>
        </div>
      </div>
      <div class="status-right">
        <span id="status-position" class="status-item">Ln 1, Col 1</span>
      </div>
    </footer>
  </div>

  <!-- Load xterm before Monaco's RequireJS so they attach to window instead of conflicting with AMD -->
  <script src="../node_modules/xterm/lib/xterm.js"></script>
  <script src="../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="file-icon-colors.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
